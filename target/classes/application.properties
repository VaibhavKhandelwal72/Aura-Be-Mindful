spring.application.name=MentalWellness

# H2 Database Setup (Persistent local file-based database)
spring.datasource.url=jdbc:h2:file:./data/mentalwellness;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=secretpassword123
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Enable H2 console for debugging, secure it appropriately
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Logging Configuration
logging.level.org.springframework.security=DEBUG
logging.level.com.vk.MentalWellness=DEBUG

server.port=8082

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY:}

