spring.application.name=MentalWellness

# H2 Database Setup (file-based, uses /tmp for Railway compatibility)
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:/tmp/mentalwellness;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=secretpassword123
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Logging Configuration
logging.level.org.springframework.security=DEBUG
logging.level.com.vk.MentalWellness=DEBUG

server.port=${PORT:8082}

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY:}

